<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Scheduled Jobs</title>
    <link href="/webjars/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/webjars/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
{#include pub/header /}
<main class="py-4">
    <div class="container">
        <h2 class="mb-4">Scheduled Jobs</h2>

        {#if jobs.isEmpty()}
            <div class="alert alert-info">No scheduled jobs found.</div>
        {#else}
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>Action</th>
                            <th>Active</th>
                            <th>Name</th>
                            <th>Description</th>
                            <th>Last Run</th>
                            <th>Next Run</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        {#for job in jobs}
                            {#include JobsResource/jobRow job=job /}
                        {/for}
                    </tbody>
                </table>
            </div>
        {/if}
    </div>
</main>

<!-- Confirmation Modal -->
<div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Confirm Action</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p id="confirmMessage"></p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="confirmBtn">Confirm</button>
            </div>
        </div>
    </div>
</div>

<script src="/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="/webjars/htmx.org/2.0.7/dist/htmx.min.js"></script>
<script src="/webjars/htmx-ext-ws/2.0.3/dist/ws.js"></script>
<script>
    let currentToggle = null;
    let currentJobName = null;
    let currentCheckState = null;

    function confirmToggle(event, jobName, isNowChecked) {
        event.preventDefault();
        currentToggle = event.target;
        currentJobName = jobName;
        currentCheckState = isNowChecked;

        const action = isNowChecked ? 'activate' : 'inactivate';
        const message = 'Are you sure you want to ' + action + ' the job "' + jobName + '"?';

        document.getElementById('confirmMessage').textContent = message;
        const modal = new bootstrap.Modal(document.getElementById('confirmModal'));
        modal.show();
    }

    document.getElementById('confirmBtn').addEventListener('click', function() {
        const modal = bootstrap.Modal.getInstance(document.getElementById('confirmModal'));
        modal.hide();

        htmx.ajax('POST', '/jobs/active?jobName=' + currentJobName, {
            target: '#job-row-' + currentJobName,
            swap: 'outerHTML'
        });
        currentToggle.checked = currentCheckState;
    });

    document.getElementById('confirmModal').addEventListener('hidden.bs.modal', function() {
        if (currentToggle) {
            currentToggle.checked = !currentCheckState;
        }
    });
</script>
</body>
</html>
